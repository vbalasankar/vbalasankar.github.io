<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding for proper text rendering -->
    <meta charset="UTF-8">
    <!-- Responsive viewport configuration for mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Page title displayed in browser tab -->
    <title>Bala Sankar</title>
    <!-- Font Awesome icon library for social media icons -->
    <script src="https://kit.fontawesome.com/786868d821.js" crossorigin="anonymous"></script>
    <!-- Google Fonts preconnect for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Share Tech font from Google Fonts for consistent typography -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">

    <style>
        /* ========================================
           GLOBAL STYLES
           ======================================== */
        
        /* Apply Share Tech font to all elements */
        *{
            font-family: "Share Tech", sans-serif;
        }
        
        /* Remove default link styling */
        a{
            text-decoration: none;
            color: black;
        }
        
        /* ========================================
           NAVIGATION BAR
           ======================================== */
        
        /* Top navigation container - right-aligned horizontal menu */
        nav{
            display: flex;
            padding-top: 25px;
            padding-bottom: 145px;
            gap: 19px;
            justify-content: flex-end;
            letter-spacing: 2px;
            font-size: 20px;
            padding-right: 20px;
        }
        
        /* Default navigation link appearance */
        nav a{
            color: gray;
        }
        
        /* Bold black text on navigation hover */
        nav a:hover{
            font-weight: 900;
            transition: 0.3s;
            color: black;
        }
        
        /* ========================================
           HERO SECTION LAYOUT
           ======================================== */
        
        /* Main content area with profile image and text side-by-side */
        .hero-content{
            display: flex;
            padding-left: 50px;
        }
        
        /* Profile image container with gradient background fallback */
        .prof-pic{
            position: relative;
            width: 805px;
            height: 600px;
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            overflow: hidden;
        }
        
        /* Profile image sizing and smooth loading transition */
        .prof-pic img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.3s ease;
        }
        
        /* Image loading state - hidden until loaded */
        .prof-pic img.loading{
            opacity: 0;
        }
        
        /* Image loaded state - fully visible */
        .prof-pic img.loaded{
            opacity: 1;
        }
        
        /* Text content container - stacked vertically beside image */
        .text-content{
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: 0;
            padding-left: 20px;
        }
        
        /* ========================================
           TEXT CONTENT ELEMENTS
           ======================================== */
        
        /* Name display container */
        .name{
            margin: 0;
            padding: 0;
        }
        
        /* Large name text - hero heading */
        .name p{
            font-size: 175px;
            font-weight: 400;
            margin: 0;
            padding: 0;
            line-height: 1;
        }
        
        /* Bio tagline and contact information styling */
        .info,.contacts{
            padding: 0;
            margin: 0;
            padding-top: 15px;
            font-size: 20px;
        }
        
        /* ========================================
           SOCIAL MEDIA SECTION
           ======================================== */
        
        /* Social links container with top spacing */
        .socials{
            padding: 0;
            margin: 0;
            padding-top: 50px;
        }
        
        /* Social media icon size and spacing */
        .socials i{
            font-size: 40px;
            margin-right: 15px;
        }
    </style>
</head>
<body>
    <!-- ========================================
         NAVIGATION MENU
         ======================================== -->
    <nav>
        <!-- Active page highlighted with bold black text -->
        <a href="index.html" style="font-weight: bold;color: black;">HOME</a>
        <a href="about.html">ABOUT ME</a>
        <a href="projects.html">PROJECTS</a>
        <a href="coolstff.html">COOL STUFFS</a>
    </nav>

    <!-- ========================================
         MAIN CONTENT AREA
         ======================================== -->
    <main>
        <div class="hero-content">
            <!-- Profile Image Section -->
            <div class="prof-pic">
                <img src="profilepic.jpeg" alt="profpic" id="profileImg" class="loading">
            </div>
            
            <!-- Text Content Section -->
            <div class="text-content">
                <!-- Name Display -->
                <div class="name">
                    <p>V BALA SANKAR</p>
                </div>
                
                <!-- Professional Tagline -->
                <div class="info">
                    <p>I DO ML AND CYBERSEC</p>
                </div>
                
                <!-- Contact Email -->
                <div class="contacts">
                    balasankar2108 [at] gmail [dot] com
                </div>
                
                <!-- Social Media Links & Resume -->
                <div class="socials">
                    <a href="https://medium.com/@ba1asankar" target="_blank" aria-label="Medium Profile"><i class="fa-brands fa-medium"></i></a>
                    <a href="https://github.com/vbalasankar" target="_blank" aria-label="GitHub Profile"><i class="fa-brands fa-github"></i></a>
                    <a href="https://www.linkedin.com/in/vbalasankar/" target="_blank" aria-label="LinkedIn Profile"><i class="fa-brands fa-linkedin"></i></a>
                    <a href="https://www.instagram.com/ba1asankar" target="_blank" aria-label="Instagram Profile"><i class="fa-brands fa-instagram"></i></a>
                    <a href="https://x.com/ba1asankar" target="_blank" aria-label="X Profile"><i class="fa-brands fa-x-twitter"></i></a>
                    <a href="https://bsky.app/profile/ba1asankar.bsky.social" target="_blank" aria-label="Bluesky Profile"><i class="fa-brands fa-bluesky"></i></a>
                    <a href="balasankar.pdf" style="font-size: 40px;" aria-label="Download CV">[CV]</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Image loading handler script -->
    <script>
        // Get profile image element
        const img = document.getElementById('profileImg');
        
        // Check if image already loaded
        if(img.complete){
            img.classList.remove('loading');
            img.classList.add('loaded');
        }else{
            // Add load event listener for async loading
            img.addEventListener('load', function(){
                this.classList.remove('loading');
                this.classList.add('loaded');
            });
        }
    </script>

</body>
</html>
